<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIQUE Hair Shop</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

/* الهيدر */
header{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    font-size:22px;
}

/* الشبكة */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:15px;
    padding:20px;
}

/* الكارد */
.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    margin:10px;
    font-size:18px;
}

.card p{
    margin:0 10px 10px;
    color:#555;
}

.price{
    margin:0 10px 15px;
    color:#d81b60;
    font-weight:bold;
}

.card a{
    text-decoration:none;
    color:inherit;
}
</style>

</head>

<body>

<header>
UNIQUE Hair Shop 💇‍♀️
</header>

<div class="container">

    <div class="card">
        <a href="products/fluffy.html">

            <img src="fluffy-250.jpg" alt="Fluffy Cream">

            <h3>Fluffy Moisturizing Cream</h3>

            <p>250 ML</p>

            <div class="price">400 جنيه مصري</div>

        </a>
    </div>

</div>

</body>
</html>
<img src="../images/fluffy-250.jpg">
