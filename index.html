<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unique Hair Shop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f7f7f7;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.hero{
background:linear-gradient(135deg,#0f766e,#14b8a6);
color:white;
padding:60px 20px;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
margin-bottom:25px;
}

.hero a{
background:white;
color:#0f766e;
padding:14px 30px;
text-decoration:none;
border-radius:50px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h2{
padding:15px;
font-size:22px;
}

.card p{
padding:0 15px;
color:#666;
}

.price{
padding:15px;
font-size:22px;
font-weight:bold;
color:#0f766e;
}

button{
width:90%;
margin:15px;
padding:15px;
border:none;
border-radius:10px;
background:#25D366;
color:white;
font-size:18px;
cursor:pointer;
}
</style>

</head>
<body>

<header>
<h2>Unique Hair Shop</h2>
</header>

<section class="hero">
<h1>منتجات شعر أصلية</h1>
<p>أفضل منتجات العناية بالشعر بأفضل الأسعار</p>
<a href="#products">تسوق الآن</a>
</section>

<section class="products" id="products">

<div class="card">
<img src="https://via.placeholder.com/400x400.png?text=Hair+Mask">
<h2>Hair Mask</h2>
<p>ماسك احترافي للشعر.</p>
<div class="price">350 EGP</div>

<button onclick="window.open('https://wa.me/249912969069?text=السلام عليكم، أريد طلب Hair Mask')">
اطلب عبر واتساب
</button>

</div>

</section>

</body>
</html>
