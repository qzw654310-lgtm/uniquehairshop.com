<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIQUE Hair Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

/* الهيدر */
header{
    background:#111;
    text-align:center;
    padding:20px;
}

/* اللوقو */
.logo{
    width:140px;
}

/* بطاقة المنتج */
.card{
    width:320px;
    margin:40px auto;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    display:block;
}

.content{
    padding:20px;
    text-align:center;
}

h3{
    margin-bottom:10px;
}

.price{
    color:#d81b60;
    font-size:22px;
    font-weight:bold;
    margin:15px 0;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#25D366;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1fa855;
}

a{
    text-decoration:none;
}
</style>

</head>

<body>

<header>
    <img src="logo.jpg" class="logo" alt="UNIQUE Hair Shop">
</header>

<div class="card">

    <img src="fluffy.jpg" alt="Fluffy Moisturizing Cream">

    <div class="content">

        <h3>Fluffy Moisturizing Cream</h3>

        <p>250 ML</p>

        <div class="price">400 جنيه مصري</div>

        <a href="https://wa.me/249912969069?text=السلام عليكم، أريد طلب منتج Fluffy Moisturizing Cream 250ml" target="_blank">
            <button>اطلب الآن</button>
        </a>

    </div>

</div>

</body>
</html>
