<h1>Fluffy Moisturizing Cream</h1>

<p><strong>الحجم:</strong> 250 ML</p>

<p><strong>السعر:</strong> <span id="price">400</span> جنيه مصري للعلبة</p>

<hr>

<h3>الكمية</h3>

<div class="qty-box">
    <button onclick="decrease()">-</button>

    <span id="qty">1</span>

    <button onclick="increase()">+</button>
</div>

<h2>
الإجمالي:
<span id="total">400</span>
جنيه
</h2>

<br>

<button class="order-btn" onclick="orderNow()">
🛒 اطلب الآن
</button>

<style>
.qty-box{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin:20px 0;
}

.qty-box button{
width:45px;
height:45px;
font-size:25px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
cursor:pointer;
}

.qty-box span{
font-size:24px;
font-weight:bold;
width:40px;
text-align:center;
}

.order-btn{
width:100%;
padding:15px;
font-size:18px;
background:#25D366;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.order-btn:hover{
background:#1ca851;
}
</style>

<script>

let quantity = 1;
const price = 400;

function update(){

document.getElementById("qty").innerHTML = quantity;

document.getElementById("total").innerHTML = quantity * price;

}

function increase(){

quantity++;

update();

}

function decrease(){

if(quantity>1){

quantity--;

update();

}

}

function orderNow(){

let message =
`السلام عليكم،

أريد طلب المنتج:

Fluffy Moisturizing Cream

الحجم: 250 ML

الكمية: ${quantity} علبة

الإجمالي: ${quantity*price} جنيه مصري`;

window.open(
"https://wa.me/249912969069?text="+encodeURIComponent(message),
"_blank"
);

}

</script>
